databases:
  - name: portfolio-contact-db
    plan: free
    databaseName: portfolio_contact
    user: portfolio_contact

services:
  - type: web
    name: portfolio-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-contact-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: ""
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false
